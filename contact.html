        <h1>Contact Us</h1>
        <p>

        </p>

        <form action="">

            <label for="name">Name and Surname:</label>
            <input type="text" name="UserName" id="name" placeholder="Full name here">
            
            <label for="phone">Phone number:</label>
            <input type="tel" id="phone" name="PhoneNum" placeholder="(+Prefix) 123 456 789">

            <label for="mail">Email:</label>
            <input type="email" name="mail" id="mail" placeholder="example@gmail.com">

            <label for="message">Write us:</label>
            <textarea id="message" name="message" placeholder="Write something here"></textarea>

            <input type="submit">
            <input type="reset">

        </form>
